  <path d="M75 58 L68 30 L82 56" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
  <path d="M125 58 L132 30 L118 56" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
  <path d="M95 52 L100 20 L105 52" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
