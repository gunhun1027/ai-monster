  <ellipse cx="88" cy="82" rx="9" ry="11" fill="#ffffff"/>
  <circle cx="88" cy="82" r="5" fill="#5b21b6"/>
  <circle cx="89" cy="80" r="2" fill="#ffffff"/>
  <ellipse cx="112" cy="82" rx="9" ry="11" fill="#ffffff"/>
  <circle cx="112" cy="82" r="5" fill="#5b21b6"/>
  <circle cx="113" cy="80" r="2" fill="#ffffff"/>
  <!-- 微笑 -->
  <path d="M88 100 Q100 112 112 100" fill="none" stroke="#5b21b6" stroke-width="2" stroke-linecap="round"/>
