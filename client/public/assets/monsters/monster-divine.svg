  <circle cx="160" cy="140" r="3" fill="#fbbf24" opacity="0.7"/>
  <circle cx="40" cy="150" r="2" fill="#fbbf24" opacity="0.9"/>
  <circle cx="100" cy="30" r="2" fill="#fbbf24" opacity="0.8"/>
