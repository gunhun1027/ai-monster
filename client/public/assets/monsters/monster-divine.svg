  <ellipse cx="100" cy="180" rx="50" ry="8" fill="#7c3aed" opacity="0.3"/>
  <path d="M85 175 L87 181 L93 183 L87 185 L85 191 L83 185 L77 183 L83 181 Z" fill="#fbbf24" opacity="0.7"/>
