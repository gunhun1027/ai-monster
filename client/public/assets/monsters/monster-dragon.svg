  <ellipse cx="110" cy="92" rx="8" ry="10" fill="#ffffff"/>
  <circle cx="110" cy="92" r="4" fill="#1e3a5f"/>
  <!-- 鼻孔 -->
  <ellipse cx="95" cy="108" rx="3" ry="2" fill="#1e3a5f"/>
  <ellipse cx="105" cy="108" rx="3" ry="2" fill="#1e3a5f"/>
