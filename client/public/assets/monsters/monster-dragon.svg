  <path d="M55 90 Q20 60 30 110 Q40 100 55 90" fill="#93c5fd" stroke="#2563eb" stroke-width="2"/>
  <path d="M145 90 Q180 60 170 110 Q160 100 145 90" fill="#93c5fd" stroke="#2563eb" stroke-width="2"/>
  <!-- 头 -->
  <ellipse cx="100" cy="95" rx="35" ry="30" fill="#60a5fa" stroke="#2563eb" stroke-width="3"/>
  <!-- 角 -->
  <path d="M78 70 L70 45 L85 68" fill="#2563eb"/>
  <path d="M122 70 L130 45 L115 68" fill="#2563eb"/>
